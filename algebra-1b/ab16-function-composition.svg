<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none">
<rect width="1200" height="420" fill="#f8fafc"/>

    <defs>
      <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
        <path d="M0,0 L12,6 L0,12 Z" fill="#334155"/>
      </marker>
    </defs>
    <rect x="40" y="70" width="240" height="120" rx="22" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="160" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1d4ed8">a(t) = t²</text>
    <text x="160" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1e3a8a">time → acceleration</text>

    <rect x="480" y="70" width="240" height="120" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="600" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#15803d">f(a) = 2a</text>
    <text x="600" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#166534">acceleration → force</text>

    <rect x="920" y="70" width="240" height="120" rx="22" fill="#fae8ff" stroke="#9333ea" stroke-width="3"/>
    <text x="1040" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#7e22ce">p(f) = ln(f)</text>
    <text x="1040" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6b21a8">force → space-tearing power</text>

    <line x1="280" y1="130" x2="480" y2="130" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="720" y1="130" x2="920" y2="130" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

    <rect x="260" y="250" width="680" height="110" rx="24" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
    <text x="600" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#c2410c">p(t) = ln(2t²)</text>
    <text x="600" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#9a3412">Compose the three functions by feeding each output into the next stage.</text>
  
</svg>
