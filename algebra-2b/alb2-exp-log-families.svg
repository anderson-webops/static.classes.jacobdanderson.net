<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
<rect width="1200" height="720" fill="#f8fafc"/>
<rect x="24" y="24" width="1152" height="672" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Exponential and Logarithmic Function Families</text>
<text x="600" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">The cleaned replacement for the original graph screenshots in ALB2 and Check-in #1.</text>

<rect x="54" y="122" width="522" height="520" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="315" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Exponential graphs</text>
<line x1="108" y1="530" x2="530" y2="530" stroke="#0f172a" stroke-width="1.5"/>
<line x1="280" y1="190" x2="280" y2="598" stroke="#0f172a" stroke-width="1.5"/>
<line x1="108" y1="454" x2="530" y2="454" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 6"/>
<text x="518" y="448" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#475569">y = 0</text>
<path d="M140 522 C198 514 233 498 280 454 C338 400 392 306 520 178" stroke="#7c3aed" stroke-width="4" fill="none"/>
<path d="M140 212 C225 278 262 352 280 454 C310 518 375 530 520 530" stroke="#16a34a" stroke-width="4" fill="none"/>
<path d="M140 530 C188 530 232 514 280 454 C320 404 378 338 520 242" stroke="#ea580c" stroke-width="4" fill="none"/>
<circle cx="280" cy="454" r="6" fill="#0f172a"/>
<text x="428" y="206" font-family="Arial, sans-serif" font-size="15" fill="#7c3aed">y = 2^x</text>
<text x="164" y="222" font-family="Arial, sans-serif" font-size="15" fill="#16a34a">y = (1/2)^x</text>
<text x="420" y="252" font-family="Arial, sans-serif" font-size="15" fill="#ea580c">y = 2^(x + 1)</text>
<text x="315" y="614" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">Domain: all real numbers. Range: positive outputs only.</text>

<rect x="624" y="122" width="522" height="520" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="885" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Logarithmic graphs</text>
<line x1="676" y1="530" x2="1100" y2="530" stroke="#0f172a" stroke-width="1.5"/>
<line x1="748" y1="190" x2="748" y2="598" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 6"/>
<line x1="820" y1="190" x2="820" y2="598" stroke="#0f172a" stroke-width="1.5"/>
<text x="742" y="208" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="#475569">x = 0</text>
<path d="M754 590 C760 516 776 474 820 454 C878 430 936 372 1084 242" stroke="#2563eb" stroke-width="4" fill="none"/>
<path d="M754 250 C760 322 776 366 820 454 C868 496 926 516 1084 526" stroke="#dc2626" stroke-width="4" fill="none"/>
<path d="M780 590 C816 560 854 520 922 474 C994 432 1040 386 1090 342" stroke="#0f766e" stroke-width="4" fill="none"/>
<circle cx="820" cy="454" r="6" fill="#0f172a"/>
<text x="1008" y="262" font-family="Arial, sans-serif" font-size="15" fill="#2563eb">y = log_2(x)</text>
<text x="996" y="532" font-family="Arial, sans-serif" font-size="15" fill="#dc2626">y = log_(1/2)(x)</text>
<text x="1036" y="350" font-family="Arial, sans-serif" font-size="15" fill="#0f766e">y = log_10(x - 1) + 3</text>
<text x="885" y="614" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">Domain: positive x-values only. Range: all real numbers.</text>
</svg>
