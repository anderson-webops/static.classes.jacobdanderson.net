<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
<rect width="1200" height="720" fill="#f8fafc"/>
<rect x="24" y="24" width="1152" height="672" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Logarithms Reference</text>
<text x="600" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">Exponential form, logarithmic form, and the key identities used throughout ALB1.</text>

<rect x="54" y="120" width="330" height="246" rx="20" fill="#eff6ff" stroke="#93c5fd"/>
<text x="219" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">BAE Conversion</text>
<text x="219" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#0f172a">3^x = 47</text>
<path d="M146 214 C118 236 118 266 146 288" stroke="#2563eb" stroke-width="4" fill="none"/>
<path d="M292 214 C320 236 320 266 292 288" stroke="#2563eb" stroke-width="4" fill="none"/>
<text x="219" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1e293b">base stays base</text>
<text x="219" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#0f172a">x = log_3(47)</text>
<text x="219" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1d4ed8">B = base, A = answer, E = exponent</text>

<rect x="435" y="120" width="330" height="246" rx="20" fill="#ecfdf5" stroke="#86efac"/>
<text x="600" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#15803d">e and Natural Log</text>
<line x1="475" y1="320" x2="725" y2="320" stroke="#334155" stroke-width="1.5"/>
<line x1="510" y1="190" x2="510" y2="336" stroke="#334155" stroke-width="1.5"/>
<path d="M470 296 C515 260 560 232 720 214" stroke="#16a34a" stroke-width="4" fill="none"/>
<line x1="470" y1="214" x2="720" y2="214" stroke="#16a34a" stroke-width="2" stroke-dasharray="8 8"/>
<text x="600" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#166534">y = (1 + 1/x)^x approaches e from below</text>
<text x="600" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#166534">e approx 2.71828</text>
<text x="600" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#166534">ln(x) means log base e</text>

<rect x="816" y="120" width="330" height="246" rx="20" fill="#fff7ed" stroke="#fdba74"/>
<text x="981" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#c2410c">Identity Bank</text>
<text x="981" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7c2d12">log_b(mn) = log_b(m) + log_b(n)</text>
<text x="981" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7c2d12">log_b(m/n) = log_b(m) - log_b(n)</text>
<text x="981" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7c2d12">log_b(m^n) = n log_b(m)</text>
<text x="981" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7c2d12">log_a(x) = log(x) / log(a)</text>

<rect x="54" y="402" width="1092" height="252" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="600" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Representative Evaluations</text>
<text x="170" y="488" font-family="Arial, sans-serif" font-size="18" fill="#334155">log_3(27) = 3</text>
<text x="170" y="526" font-family="Arial, sans-serif" font-size="18" fill="#334155">log_2(128) = 7</text>
<text x="170" y="564" font-family="Arial, sans-serif" font-size="18" fill="#334155">log_3(1/9) = -2</text>
<text x="170" y="602" font-family="Arial, sans-serif" font-size="18" fill="#334155">log_125(5) = 1/3</text>
<text x="470" y="488" font-family="Arial, sans-serif" font-size="18" fill="#334155">ln(5x^7 / y) = ln(5) + 7ln(x) - ln(y)</text>
<text x="470" y="526" font-family="Arial, sans-serif" font-size="18" fill="#334155">log_4(6) = log(6) / log(4) approx 1.29</text>
<text x="470" y="564" font-family="Arial, sans-serif" font-size="18" fill="#334155">log_3(19) = log(19) / log(3) approx 2.68</text>
<text x="470" y="602" font-family="Arial, sans-serif" font-size="18" fill="#334155">log_2(12) = log(12) / log(2) approx 3.58</text>
</svg>
