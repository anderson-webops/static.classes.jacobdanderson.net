<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
<rect width="1200" height="720" fill="#f8fafc"/>
<rect x="24" y="24" width="1152" height="672" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Geometric Sequences and Series</text>
<text x="600" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">Ratios create exponential growth or decay. Infinite sums only converge when |r| is less than 1.</text>

<rect x="54" y="122" width="518" height="520" rx="20" fill="#ecfdf5" stroke="#86efac"/>
<text x="313" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#15803d">Sequence as an exponential pattern</text>
<line x1="110" y1="544" x2="510" y2="544" stroke="#0f172a" stroke-width="1.5"/>
<line x1="150" y1="190" x2="150" y2="588" stroke="#0f172a" stroke-width="1.5"/>
<path d="M150 518 C190 512 214 496 238 474 C270 442 292 396 510 210" stroke="#16a34a" stroke-width="4" fill="none"/>
<circle cx="150" cy="518" r="7" fill="#16a34a"/>
<circle cx="190" cy="506" r="7" fill="#16a34a"/>
<circle cx="238" cy="474" r="7" fill="#16a34a"/>
<circle cx="304" cy="410" r="7" fill="#16a34a"/>
<circle cx="384" cy="314" r="7" fill="#16a34a"/>
<text x="313" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#166534">Example: 1, 3, 9, 27, ... with r = 3</text>
<text x="313" y="606" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#166534">a_n = a_1 r^(n - 1)</text>

<rect x="628" y="122" width="518" height="520" rx="20" fill="#fff7ed" stroke="#fdba74"/>
<text x="887" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#c2410c">Converging infinite series</text>
<rect x="706" y="220" width="260" height="260" fill="#fef2f2" stroke="#fca5a5" stroke-width="3"/>
<rect x="706" y="220" width="130" height="260" fill="#fecaca"/>
<rect x="836" y="220" width="130" height="130" fill="#fda4af"/>
<rect x="836" y="350" width="65" height="130" fill="#fb7185"/>
<rect x="901" y="350" width="65" height="65" fill="#f43f5e"/>
<text x="887" y="516" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#9f1239">1/2 + 1/4 + 1/8 + ... stays inside the whole square</text>
<text x="887" y="556" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9a3412">S_n = a_1(1 - r^n) / (1 - r)</text>
<text x="887" y="586" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9a3412">S = a_1 / (1 - r) when |r| &lt; 1</text>
</svg>
