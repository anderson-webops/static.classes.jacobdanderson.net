<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
<rect width="1200" height="700" fill="#f8fafc"/>
<rect x="24" y="24" width="1152" height="652" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Rational Functions</text>
<text x="600" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">Asymptotes, holes, and root checks</text>

<rect x="60" y="120" width="320" height="500" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="220" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Parent graph y = 1/x</text>
<line x1="220" y1="180" x2="220" y2="580" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8"/>
<line x1="100" y1="380" x2="340" y2="380" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8"/>
<line x1="100" y1="380" x2="340" y2="380" stroke="#0f172a" stroke-width="1.5"/>
<line x1="220" y1="180" x2="220" y2="580" stroke="#0f172a" stroke-width="1.5"/>
<path d="M230 200 C260 230 290 290 328 370" stroke="#2563eb" stroke-width="4" fill="none"/>
<path d="M112 390 C150 470 180 530 210 560" stroke="#2563eb" stroke-width="4" fill="none"/>
<text x="312" y="206" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">approaches both axes</text>

<rect x="440" y="120" width="320" height="500" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="600" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Hole vs asymptote</text>
<text x="600" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">Example shape with a removable discontinuity at x = 2 and a vertical asymptote at x = 3</text>
<line x1="640" y1="200" x2="640" y2="580" stroke="#0f172a" stroke-width="1.5"/>
<line x1="480" y1="390" x2="720" y2="390" stroke="#0f172a" stroke-width="1.5"/>
<line x1="670" y1="200" x2="670" y2="580" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8"/>
<path d="M500 520 C540 460 575 410 620 360" stroke="#16a34a" stroke-width="4" fill="none"/>
<path d="M620 360 C640 340 652 330 664 210" stroke="#16a34a" stroke-width="4" fill="none"/>
<path d="M676 560 C692 460 706 430 720 410" stroke="#16a34a" stroke-width="4" fill="none"/>
<circle cx="610" cy="370" r="9" fill="#ffffff" stroke="#dc2626" stroke-width="4"/>
<text x="552" y="340" font-family="Arial, sans-serif" font-size="13" fill="#b91c1c">open circle = removable discontinuity</text>
<text x="680" y="228" font-family="Arial, sans-serif" font-size="13" fill="#475569">x = 3</text>

<rect x="820" y="120" width="320" height="500" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="980" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Degree rules</text>
<line x1="980" y1="200" x2="980" y2="580" stroke="#0f172a" stroke-width="1.5"/>
<line x1="860" y1="390" x2="1100" y2="390" stroke="#0f172a" stroke-width="1.5"/>
<line x1="920" y1="200" x2="920" y2="580" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8"/>
<line x1="1040" y1="200" x2="1040" y2="580" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8"/>
<path d="M860 250 C900 350 905 430 918 560" stroke="#7c3aed" stroke-width="4" fill="none"/>
<path d="M922 560 C950 480 960 430 980 390 C1000 350 1010 300 1038 220" stroke="#7c3aed" stroke-width="4" fill="none"/>
<path d="M1042 220 C1060 300 1070 350 1100 430" stroke="#7c3aed" stroke-width="4" fill="none"/>
