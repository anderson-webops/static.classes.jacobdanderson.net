<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" fill="none">
<rect width="1200" height="620" fill="#f8fafc"/>
<rect x="24" y="24" width="552" height="572" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<rect x="624" y="24" width="552" height="572" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

<text x="300" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Parent and Stretch Comparisons</text>
<text x="300" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">Three common graphs built from y = x^2</text>
<line x1="90" y1="470" x2="510" y2="470" stroke="#0f172a" stroke-width="2"/>
<line x1="300" y1="120" x2="300" y2="500" stroke="#0f172a" stroke-width="2"/>
<path d="M80 470 Q300 150 520 470" stroke="#2563eb" stroke-width="4" fill="none"/>
<path d="M160 470 Q300 80 440 470" stroke="#dc2626" stroke-width="4" fill="none"/>
<path d="M60 470 Q300 250 540 470" stroke="#16a34a" stroke-width="4" fill="none"/>
<circle cx="300" cy="150" r="5" fill="#2563eb"/>
<circle cx="300" cy="80" r="5" fill="#dc2626"/>
<circle cx="300" cy="250" r="5" fill="#16a34a"/>
<text x="332" y="156" font-family="Arial, sans-serif" font-size="14" fill="#1d4ed8">y = x^2</text>
<text x="332" y="86" font-family="Arial, sans-serif" font-size="14" fill="#b91c1c">y = 2x^2</text>
<text x="332" y="256" font-family="Arial, sans-serif" font-size="14" fill="#15803d">y = (1/4)x^2</text>
<text x="300" y="538" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">Positive a opens upward. Larger |a| makes the parabola narrower.</text>

<text x="900" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Vertex and Intercept Form</text>
<text x="900" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">Example: y = (x + 2)^2 - 9 = (x + 5)(x - 1)</text>
<line x1="690" y1="420" x2="1110" y2="420" stroke="#0f172a" stroke-width="2"/>
<line x1="900" y1="110" x2="900" y2="500" stroke="#0f172a" stroke-width="2"/>
<path d="M700 130 Q820 420 940 500 Q1060 420 1100 130" stroke="#7c3aed" stroke-width="4" fill="none"/>
<circle cx="820" cy="420" r="7" fill="#f59e0b"/>
<circle cx="940" cy="420" r="7" fill="#f59e0b"/>
<circle cx="880" cy="500" r="7" fill="#dc2626"/>
<text x="734" y="412" font-family="Arial, sans-serif" font-size="14" fill="#b45309">(-5, 0)</text>
<text x="948" y="412" font-family="Arial, sans-serif" font-size="14" fill="#b45309">(1, 0)</text>
<text x="892" y="532" font-family="Arial, sans-serif" font-size="14" fill="#b91c1c">vertex (-2, -9)</text>
<text x="900" y="566" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">Vertex form reveals the turn. Intercept form reveals the x-axis crossings.</text>
</svg>
