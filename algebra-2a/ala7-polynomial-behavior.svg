<circle cx="420" cy="440" r="6" fill="#f59e0b"/>
<text x="370" y="612" font-family="Arial, sans-serif" font-size="14" fill="#b45309">even multiplicity touches and turns</text>

<rect x="660" y="400" width="420" height="220" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="870" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Feature-Based Sketching</text>
<text x="690" y="474" font-family="Arial, sans-serif" font-size="15" fill="#334155">Use these checkpoints when the original graph is missing:</text>
<text x="710" y="510" font-family="Arial, sans-serif" font-size="15" fill="#334155">- degree parity determines whether the ends agree</text>
<text x="710" y="540" font-family="Arial, sans-serif" font-size="15" fill="#334155">- leading coefficient sets the final direction</text>
<text x="710" y="570" font-family="Arial, sans-serif" font-size="15" fill="#334155">- zeros mark x-axis contacts</text>
<text x="710" y="600" font-family="Arial, sans-serif" font-size="15" fill="#334155">- multiplicity decides bounce vs cross</text>
</svg>
