<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" fill="none">
<rect width="1200" height="620" fill="#f8fafc"/>
<rect x="24" y="24" width="1152" height="572" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

<text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Quadratic Transformations</text>
<text x="600" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">Generated replacement for the missing color-match graph set</text>

<rect x="60" y="120" width="320" height="400" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="220" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Reflection</text>
<line x1="100" y1="420" x2="340" y2="420" stroke="#0f172a" stroke-width="2"/>
<line x1="220" y1="170" x2="220" y2="480" stroke="#0f172a" stroke-width="2"/>
<path d="M100 420 Q220 210 340 420" stroke="#2563eb" stroke-width="4" fill="none"/>
<path d="M100 420 Q220 540 340 420" stroke="#dc2626" stroke-width="4" fill="none"/>
<text x="104" y="198" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">y = x^2</text>
<text x="242" y="478" font-family="Arial, sans-serif" font-size="13" fill="#b91c1c">y = -x^2</text>

<rect x="440" y="120" width="320" height="400" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="600" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Translation</text>
<line x1="480" y1="420" x2="720" y2="420" stroke="#0f172a" stroke-width="2"/>
<line x1="600" y1="170" x2="600" y2="480" stroke="#0f172a" stroke-width="2"/>
<path d="M480 420 Q600 210 720 420" stroke="#94a3b8" stroke-width="4" fill="none"/>
<path d="M520 350 Q640 140 760 350" stroke="#7c3aed" stroke-width="4" fill="none"/>
<circle cx="640" cy="140" r="6" fill="#7c3aed"/>
<text x="500" y="198" font-family="Arial, sans-serif" font-size="13" fill="#64748b">base graph</text>
<text x="648" y="134" font-family="Arial, sans-serif" font-size="13" fill="#6d28d9">(3, 4)</text>
<text x="518" y="372" font-family="Arial, sans-serif" font-size="13" fill="#6d28d9">y = (x - 3)^2 + 4</text>

<rect x="820" y="120" width="320" height="400" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="980" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Vertical Scale</text>
<line x1="860" y1="420" x2="1100" y2="420" stroke="#0f172a" stroke-width="2"/>
<line x1="980" y1="170" x2="980" y2="480" stroke="#0f172a" stroke-width="2"/>
<path d="M860 420 Q980 210 1100 420" stroke="#2563eb" stroke-width="4" fill="none"/>
<path d="M900 420 Q980 130 1060 420" stroke="#dc2626" stroke-width="4" fill="none"/>
<path d="M840 420 Q980 300 1120 420" stroke="#16a34a" stroke-width="4" fill="none"/>
<text x="1022" y="210" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">y = x^2</text>
<text x="1000" y="128" font-family="Arial, sans-serif" font-size="13" fill="#b91c1c">y = 2x^2</text>
<text x="1000" y="302" font-family="Arial, sans-serif" font-size="13" fill="#15803d">y = (1/2)x^2</text>

<text x="600" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">Shifts move the vertex. Reflections flip the opening. Scaling changes width without changing the axis of symmetry.</text>
</svg>
