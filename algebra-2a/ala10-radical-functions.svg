<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" fill="none">
<rect width="1200" height="620" fill="#f8fafc"/>
<rect x="24" y="24" width="1152" height="572" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Radical Functions</text>
<text x="600" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#475569">Even roots restrict domain. Odd roots do not.</text>

<rect x="60" y="120" width="320" height="400" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="220" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">y = sqrt(x)</text>
<line x1="100" y1="430" x2="340" y2="430" stroke="#0f172a" stroke-width="1.5"/>
<line x1="140" y1="180" x2="140" y2="480" stroke="#0f172a" stroke-width="1.5"/>
<path d="M140 430 C165 410 190 375 220 335 C255 290 295 250 335 220" stroke="#2563eb" stroke-width="4" fill="none"/>
<text x="220" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">domain x >= 0, range y >= 0</text>

<rect x="440" y="120" width="320" height="400" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="600" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">y = sqrt(x - 3) + 2</text>
<line x1="480" y1="430" x2="720" y2="430" stroke="#0f172a" stroke-width="1.5"/>
<line x1="520" y1="180" x2="520" y2="480" stroke="#0f172a" stroke-width="1.5"/>
<path d="M610 330 C635 310 660 275 690 235 C705 215 720 200 735 190" stroke="#7c3aed" stroke-width="4" fill="none"/>
<circle cx="610" cy="330" r="6" fill="#7c3aed"/>
<text x="618" y="322" font-family="Arial, sans-serif" font-size="13" fill="#6d28d9">start (3, 2)</text>
<text x="600" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">shift right 3 and up 2</text>

<rect x="820" y="120" width="320" height="400" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
<text x="980" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">y = cuberoot(x)</text>
<line x1="860" y1="350" x2="1100" y2="350" stroke="#0f172a" stroke-width="1.5"/>
<line x1="980" y1="180" x2="980" y2="480" stroke="#0f172a" stroke-width="1.5"/>
<path d="M880 420 C915 420 940 380 970 360 C990 345 1010 335 1040 295 C1065 260 1085 240 1100 240" stroke="#16a34a" stroke-width="4" fill="none"/>
<text x="980" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">domain and range are all real numbers</text>
</svg>
