name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-lfs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Git LFS hooks
        run: git lfs install

      - name: Verify LFS checkout
        run: ./scripts/verify-lfs-checkout.sh
